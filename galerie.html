<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie – Mein Reiseblog</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

<nav class="navbar">
  <h1>📸 Galerie</h1>
  <div>
    <a href="index.html">Blog</a>
    <a href="galerie.html">Galerie</a>
    <button id="darkToggle">🌙</button>
  </div>
</nav>

<main class="container">
  <div class="gallery">
  <img src="images/foto1.jpg" loading="lazy"
       data-title="Sonnenuntergang"
       data-location="Santorini, Griechenland">

  <img src="images/foto2.jpg" loading="lazy"
       data-title="Wasserfall"
       data-location="Island">

  <img src="images/foto3.jpg" loading="lazy"
       data-title="Altstadt"
       data-location="Barcelona, Spanien">

  <img src="images/italien.jpg" loading="lazy"
       data-title="Strandtag"
       data-location="Amalfiküste, Italien">
</div>
</main>

<footer>
  <p>© 2026 sim-dev · Erstellt mit ❤️ und KI</p>
</footer>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <button class="nav prev">❮</button>
  <img class="lightbox-img" src="">
  <button class="nav next">❯</button>

  <div class="lightbox-info">
    <h3 id="lb-title"></h3>
    <p id="lb-location"></p>
  </div>

  <span class="close">&times;</span>
</div>

</body>
</html>
